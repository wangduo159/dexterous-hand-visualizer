# Inspire Hand 灵巧手配置（因时机器人）
# 五指手：拇指(4DOF) + 食指(2DOF) + 中指(2DOF) + 无名指(2DOF) + 小指(2DOF) = 12 DOF
# 注意：左右手关节名完全相同（URDF 中无 left_/right_ 前缀区分）
# URDF 来源: https://github.com/dexsuite/dex-urdf
#            robots/hands/inspire_hand/
# Mesh 格式: GLB (visual) + OBJ (collision)

hand_name: "inspire_hand"
display_name: "Inspire Hand"
dof: 12
fingers: ["thumb", "index", "middle", "ring", "pinky"]

# URDF 文件路径（相对于 urdf_assets/inspire_hand/）
urdf:
  left:  "inspire_hand_left.urdf"
  right: "inspire_hand_right.urdf"

# 关节列表（左右手关节名相同，URDF 内部无 side 前缀）
# 顺序：拇指4个 → 食指2个 → 中指2个 → 无名指2个 → 小指2个
joints:
  default:
    # 拇指 (Thumb) - 4 DOF
    - name: "thumb_proximal_yaw_joint"
      finger: "thumb"
      dof_index: 0
      limit_lower: 0.0
      limit_upper: 1.308     # ~75°，拇指外展/内收
    - name: "thumb_proximal_pitch_joint"
      finger: "thumb"
      dof_index: 1
      limit_lower: 0.0
      limit_upper: 0.6       # ~34°，拇指近端弯曲
    - name: "thumb_intermediate_joint"
      finger: "thumb"
      dof_index: 2
      limit_lower: 0.0
      limit_upper: 0.8       # ~46°，拇指中段弯曲
    - name: "thumb_distal_joint"
      finger: "thumb"
      dof_index: 3
      limit_lower: 0.0
      limit_upper: 0.4       # ~23°，拇指末端弯曲

    # 食指 (Index) - 2 DOF
    - name: "index_proximal_joint"
      finger: "index"
      dof_index: 4
      limit_lower: 0.0
      limit_upper: 1.47      # ~84°，近端弯曲
    - name: "index_intermediate_joint"
      finger: "index"
      dof_index: 5
      limit_lower: -0.0454   # ~-2.6°
      limit_upper:  1.56     # ~89°，中段弯曲

    # 中指 (Middle) - 2 DOF
    - name: "middle_proximal_joint"
      finger: "middle"
      dof_index: 6
      limit_lower: 0.0
      limit_upper: 1.47
    - name: "middle_intermediate_joint"
      finger: "middle"
      dof_index: 7
      limit_lower: -0.0454
      limit_upper:  1.56

    # 无名指 (Ring) - 2 DOF
    - name: "ring_proximal_joint"
      finger: "ring"
      dof_index: 8
      limit_lower: 0.0
      limit_upper: 1.47
    - name: "ring_intermediate_joint"
      finger: "ring"
      dof_index: 9
      limit_lower: -0.0454
      limit_upper:  1.56

    # 小指 (Pinky) - 2 DOF
    - name: "pinky_proximal_joint"
      finger: "pinky"
      dof_index: 10
      limit_lower: 0.0
      limit_upper: 1.47
    - name: "pinky_intermediate_joint"
      finger: "pinky"
      dof_index: 11
      limit_lower: -0.0454
      limit_upper:  1.56

# Mesh 说明：GLB 格式，yourdfpy 加载时需 load_meshes=False 跳过 trimesh 解析
mesh_format: "glb"
mesh_note: "visual mesh 为 .glb 格式，collision mesh 为 .obj 格式，Rerun Asset3D 支持 GLB 直接渲染"

urdf_download:
  source: "https://github.com/dexsuite/dex-urdf"
  path_in_repo: "robots/hands/inspire_hand/"
  note: "含左右手 URDF，visual mesh 为 GLB，collision mesh 为 OBJ"
