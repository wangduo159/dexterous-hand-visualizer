      finger: "thumb"
      dof_index: 1
      limit_lower: -1.5708
      limit_upper:  1.5708
    - name: "left_index_joint_0"
      finger: "index"
      dof_index: 2
      limit_lower: -1.5708
      limit_upper:  1.5708
    - name: "left_index_joint_1"
      finger: "index"
      dof_index: 3
      limit_lower: -1.5708
      limit_upper:  1.5708
    - name: "left_middle_joint_0"
      finger: "middle"
      dof_index: 4
      limit_lower: -1.5708
      limit_upper:  1.5708
    - name: "left_middle_joint_1"
      finger: "middle"
      dof_index: 5
      limit_lower: -1.5708
