# 宇树 Dex5-1 灵巧手配置
# 五指手：单手 20 DOF（16主动 + 4被动）
# 发布时间: 2025年4月
# URDF 来源: 待确认（官方尚未公开，可能在 unitree_ros 后续版本中发布）
# 参考: https://www.unitree.com/cn/Dex5-1/

hand_name: "unitree_dex5"
display_name: "宇树 Dex5-1"
dof: 16   # 主动自由度
fingers: ["thumb", "index", "middle", "ring", "pinky"]

urdf:
  left: "dex5_1_l.urdf"    # 待获取
  right: "dex5_1_r.urdf"   # 待获取

# 关节列表（基于 Dex5 产品规格推断，需下载官方 URDF 后核实）
# 每根手指约 3-4 DOF，拇指额外有外展自由度
joints:
  left:
    # 拇指 (4 DOF)
    - name: "left_hand_thumb_0_joint"
      finger: "thumb"
      dof_index: 0
      description: "拇指外展/内收"
      limit_lower: -0.7854
      limit_upper:  0.7854
    - name: "left_hand_thumb_1_joint"
      finger: "thumb"
      dof_index: 1
      description: "拇指掌指关节弯曲"
      limit_lower: -0.1745
      limit_upper:  1.5708
    - name: "left_hand_thumb_2_joint"
      finger: "thumb"
      dof_index: 2
      description: "拇指近端指间关节"
      limit_lower: 0.0
      limit_upper: 1.5708
    - name: "left_hand_thumb_3_joint"
      finger: "thumb"
      dof_index: 3
      description: "拇指远端指间关节"
      limit_lower: 0.0
      limit_upper: 1.3963
    # 食指 (3 DOF)
    - name: "left_hand_index_0_joint"
      finger: "index"
      dof_index: 4
      description: "食指掌指关节弯曲"
      limit_lower: -1.5708
      limit_upper:  0.0
    - name: "left_hand_index_1_joint"
      finger: "index"
      dof_index: 5
      description: "食指近端指间关节"
      limit_lower: -1.5708
      limit_upper:  0.0
    - name: "left_hand_index_2_joint"
      finger: "index"
      dof_index: 6
      description: "食指远端指间关节"
      limit_lower: -1.3963
      limit_upper:  0.0
    # 中指 (3 DOF)
    - name: "left_hand_middle_0_joint"
      finger: "middle"
      dof_index: 7
      limit_lower: -1.5708
      limit_upper:  0.0
    - name: "left_hand_middle_1_joint"
      finger: "middle"
      dof_index: 8
      limit_lower: -1.5708
      limit_upper:  0.0
    - name: "left_hand_middle_2_joint"
      finger: "middle"
      dof_index: 9
      limit_lower: -1.3963
      limit_upper:  0.0
    # 无名指 (3 DOF)
    - name: "left_hand_ring_0_joint"
      finger: "ring"
      dof_index: 10
      limit_lower: -1.5708
      limit_upper:  0.0
    - name: "left_hand_ring_1_joint"
      finger: "ring"
      dof_index: 11
      limit_lower: -1.5708
      limit_upper:  0.0
    - name: "left_hand_ring_2_joint"
      finger: "ring"
      dof_index: 12
      limit_lower: -1.3963
      limit_upper:  0.0
    # 小指 (3 DOF)
    - name: "left_hand_pinky_0_joint"
      finger: "pinky"
      dof_index: 13
      limit_lower: -1.5708
      limit_upper:  0.0
    - name: "left_hand_pinky_1_joint"
      finger: "pinky"
      dof_index: 14
      limit_lower: -1.5708
      limit_upper:  0.0
    - name: "left_hand_pinky_2_joint"
      finger: "pinky"
      dof_index: 15
      limit_lower: -1.3963
      limit_upper:  0.0

  # 右手关节名称与左手对称，前缀改为 right_hand_
  right: ~   # 与 left 结构相同，前缀替换为 right_hand_

urdf_download:
  source: "https://github.com/unitreerobotics/unitree_ros"
  path_in_repo: "robots/dexterous_hand_description/dex5_1/"
  note: "Dex5-1 URDF 尚未公开，请关注官方仓库更新"
  status: "待获取"
