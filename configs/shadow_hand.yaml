# Shadow Hand 配置（Shadow Robot Company）
# 五指手，24 DOF（不含手腕 WRJ1/WRJ2）
# 命名：FF=食指, MF=中指, RF=无名指, LF=小指, TH=拇指
# J1~J4: 各指关节，J5: 小指掌骨关节
# 注意：URDF 中关节名无 rh_/lh_ 前缀，pkl 中也无前缀，此处保持一致

hand_name: "shadow_hand"
display_name: "Shadow Hand"
dof: 24
fingers: ["index", "middle", "ring", "pinky", "thumb"]

urdf:
  left:  "shadow_hand_left.urdf"
  right: "shadow_hand_right.urdf"

urdf_dir_override: "/Users/wangduo/Downloads/retarget/assets/robots/hands/shadow_hand"

joints:
  right:
    # 手腕
    - {name: "WRJ2",  finger: "wrist", dof_index: 0,  limit_lower: -0.524, limit_upper: 0.175}
    - {name: "WRJ1",  finger: "wrist", dof_index: 1,  limit_lower: -0.698, limit_upper: 0.489}
    # 食指 (FF)
    - {name: "FFJ4",  finger: "index", dof_index: 2,  limit_lower: -0.349, limit_upper: 0.349}
    - {name: "FFJ3",  finger: "index", dof_index: 3,  limit_lower: -0.262, limit_upper: 1.571}
