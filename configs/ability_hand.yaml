# Ability Hand 配置（PSYONIC）
# 五指手，10 DOF，每指2个关节（q1=近端, q2=远端）

hand_name: "ability_hand"
display_name: "Ability Hand"
dof: 10
fingers: ["index", "middle", "pinky", "ring", "thumb"]

urdf:
  left:  "ability_hand_left.urdf"
  right: "ability_hand_right.urdf"

urdf_dir_override: "/Users/wangduo/Downloads/retarget/assets/robots/hands/ability_hand"

joints:
  right:
    - {name: "index_q1",  finger: "index",  dof_index: 0, limit_lower: 0.0,    limit_upper: 2.094}
    - {name: "index_q2",  finger: "index",  dof_index: 1, limit_lower: 0.0,    limit_upper: 2.659}
    - {name: "middle_q1", finger: "middle", dof_index: 2, limit_lower: 0.0,    limit_upper: 2.094}
    - {name: "middle_q2", finger: "middle", dof_index: 3, limit_lower: 0.0,    limit_upper: 2.659}
    - {name: "pinky_q1",  finger: "pinky",  dof_index: 4, limit_lower: 0.0,    limit_upper: 2.094}
    - {name: "pinky_q2",  finger: "pinky",  dof_index: 5, limit_lower: 0.0,    limit_upper: 2.659}
    - {name: "ring_q1",   finger: "ring",   dof_index: 6, limit_lower: 0.0,    limit_upper: 2.094}
    - {name: "ring_q2",   finger: "ring",   dof_index: 7, limit_lower: 0.0,    limit_upper: 2.659}
    - {name: "thumb_q1",  finger: "thumb",  dof_index: 8, limit_lower: -2.094, limit_upper: 0.0}
    - {name: "thumb_q2",  finger: "thumb",  dof_index: 9, limit_lower: 0.0,    limit_upper: 2.094}
