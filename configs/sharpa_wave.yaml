# Sharpa Wave 灵巧手配置
# 五指手，每指含 MCP_FE + MCP_AA + PIP + DIP，拇指含 CMC_FE + CMC_AA + MCP_FE + MCP_AA + IP
# 拇指(5DOF) + 食指(4DOF) + 中指(4DOF) + 无名指(4DOF) + 小指(4DOF+1CMC) = 22 DOF
# URDF 来源: https://github.com/sharpa-robotics/sharpa-urdf-usd-xml
#            wave_01/right_sharpa_wave/ 和 wave_01/left_sharpa_wave/
# Mesh 格式: STL

hand_name: "sharpa_wave"
display_name: "Sharpa Wave"
dof: 22
fingers: ["thumb", "index", "middle", "ring", "pinky"]

# URDF 文件路径（相对于 urdf_assets/sharpa_wave/）
urdf:
  left:  "left_sharpa_wave.urdf"
  right: "right_sharpa_wave.urdf"

# 右手关节列表
# 关节命名规则：
#   CMC = 腕掌关节 (Carpometacarpal)
#   MCP = 掌指关节 (Metacarpophalangeal)
#   PIP = 近端指间关节 (Proximal Interphalangeal)
#   DIP = 远端指间关节 (Distal Interphalangeal)
#   IP  = 指间关节 (Interphalangeal，拇指专用)
#   FE  = 屈伸 (Flexion/Extension)
#   AA  = 外展/内收 (Abduction/Adduction)
joints:
  right:
    # 拇指 (Thumb) - 5 DOF
    - name: "right_thumb_CMC_FE"
      finger: "thumb"
      dof_index: 0
      limit_lower: -0.1745   # ~-10°
      limit_upper:  1.9199   # ~110°，CMC 屈伸
    - name: "right_thumb_CMC_AA"
      finger: "thumb"
      dof_index: 1
      limit_lower: -0.3491   # ~-20°
      limit_upper:  0.3491   # ~20°，CMC 外展/内收
    - name: "right_thumb_MCP_FE"
      finger: "thumb"
      dof_index: 2
      limit_lower: -0.5236   # ~-30°
      limit_upper:  1.3963   # ~80°，MCP 屈伸
    - name: "right_thumb_MCP_AA"
      finger: "thumb"
      dof_index: 3
      limit_lower: -0.3491
      limit_upper:  0.3491   # MCP 外展/内收
    - name: "right_thumb_IP"
      finger: "thumb"
      dof_index: 4
      limit_lower: 0.0
      limit_upper: 1.7453    # ~100°，指间关节弯曲

    # 食指 (Index) - 4 DOF
    - name: "right_index_MCP_FE"
      finger: "index"
      dof_index: 5
      limit_lower: -0.1745
      limit_upper:  1.5708   # 90°
    - name: "right_index_MCP_AA"
      finger: "index"
      dof_index: 6
      limit_lower: -0.3491
      limit_upper:  0.3491
    - name: "right_index_PIP"
      finger: "index"
      dof_index: 7
      limit_lower: 0.0
      limit_upper: 1.7453    # ~100°
    - name: "right_index_DIP"
      finger: "index"
      dof_index: 8
      limit_lower: 0.0
      limit_upper: 1.3963    # 80°

    # 中指 (Middle) - 4 DOF
    - name: "right_middle_MCP_FE"
      finger: "middle"
      dof_index: 9
      limit_lower: -0.1745
      limit_upper:  1.5708
    - name: "right_middle_MCP_AA"
      finger: "middle"
      dof_index: 10
      limit_lower: -0.3491
      limit_upper:  0.3491
    - name: "right_middle_PIP"
      finger: "middle"
      dof_index: 11
      limit_lower: 0.0
      limit_upper: 1.7453
    - name: "right_middle_DIP"
      finger: "middle"
      dof_index: 12
      limit_lower: 0.0
      limit_upper: 1.3963

    # 无名指 (Ring) - 4 DOF
    - name: "right_ring_MCP_FE"
      finger: "ring"
      dof_index: 13
      limit_lower: -0.1745
      limit_upper:  1.5708
    - name: "right_ring_MCP_AA"
      finger: "ring"
      dof_index: 14
      limit_lower: -0.3491
      limit_upper:  0.3491
    - name: "right_ring_PIP"
      finger: "ring"
      dof_index: 15
      limit_lower: 0.0
      limit_upper: 1.7453
    - name: "right_ring_DIP"
      finger: "ring"
      dof_index: 16
      limit_lower: 0.0
      limit_upper: 1.3963

    # 小指 (Pinky) - 4 DOF + 1 CMC
    - name: "right_pinky_CMC"
      finger: "pinky"
      dof_index: 17
      limit_lower: 0.0
      limit_upper: 0.2618    # ~15°，小指掌骨弯曲
    - name: "right_pinky_MCP_FE"
      finger: "pinky"
      dof_index: 18
      limit_lower: -0.1745
      limit_upper:  1.5708
    - name: "right_pinky_MCP_AA"
      finger: "pinky"
      dof_index: 19
      limit_lower: -0.3491
      limit_upper:  0.3491
    - name: "right_pinky_PIP"
      finger: "pinky"
      dof_index: 20
      limit_lower: 0.0
      limit_upper: 1.7453
    - name: "right_pinky_DIP"
      finger: "pinky"
      dof_index: 21
      limit_lower: 0.0
      limit_upper: 1.3963

  left:
    # 拇指 (Thumb) - 5 DOF
    - name: "left_thumb_CMC_FE"
      finger: "thumb"
      dof_index: 0
      limit_lower: -0.1745
      limit_upper:  1.9199
    - name: "left_thumb_CMC_AA"
      finger: "thumb"
      dof_index: 1
      limit_lower: -0.3491
      limit_upper:  0.3491
    - name: "left_thumb_MCP_FE"
      finger: "thumb"
      dof_index: 2
      limit_lower: -0.5236
      limit_upper:  1.3963
    - name: "left_thumb_MCP_AA"
      finger: "thumb"
      dof_index: 3
      limit_lower: -0.3491
      limit_upper:  0.3491
    - name: "left_thumb_IP"
      finger: "thumb"
      dof_index: 4
      limit_lower: 0.0
      limit_upper: 1.7453

    # 食指 (Index) - 4 DOF
    - name: "left_index_MCP_FE"
      finger: "index"
      dof_index: 5
      limit_lower: -0.1745
      limit_upper:  1.5708
    - name: "left_index_MCP_AA"
      finger: "index"
      dof_index: 6
      limit_lower: -0.3491
      limit_upper:  0.3491
    - name: "left_index_PIP"
      finger: "index"
      dof_index: 7
      limit_lower: 0.0
      limit_upper: 1.7453
    - name: "left_index_DIP"
      finger: "index"
      dof_index: 8
      limit_lower: 0.0
      limit_upper: 1.3963

    # 中指 (Middle) - 4 DOF
    - name: "left_middle_MCP_FE"
      finger: "middle"
      dof_index: 9
      limit_lower: -0.1745
      limit_upper:  1.5708
    - name: "left_middle_MCP_AA"
      finger: "middle"
      dof_index: 10
      limit_lower: -0.3491
      limit_upper:  0.3491
    - name: "left_middle_PIP"
      finger: "middle"
      dof_index: 11
      limit_lower: 0.0
      limit_upper: 1.7453
    - name: "left_middle_DIP"
      finger: "middle"
      dof_index: 12
      limit_lower: 0.0
      limit_upper: 1.3963

    # 无名指 (Ring) - 4 DOF
    - name: "left_ring_MCP_FE"
      finger: "ring"
      dof_index: 13
      limit_lower: -0.1745
      limit_upper:  1.5708
    - name: "left_ring_MCP_AA"
      finger: "ring"
      dof_index: 14
      limit_lower: -0.3491
      limit_upper:  0.3491
    - name: "left_ring_PIP"
      finger: "ring"
      dof_index: 15
      limit_lower: 0.0
      limit_upper: 1.7453
    - name: "left_ring_DIP"
      finger: "ring"
      dof_index: 16
      limit_lower: 0.0
      limit_upper: 1.3963

    # 小指 (Pinky) - 4 DOF + 1 CMC
    - name: "left_pinky_CMC"
      finger: "pinky"
      dof_index: 17
      limit_lower: 0.0
      limit_upper: 0.2618
    - name: "left_pinky_MCP_FE"
      finger: "pinky"
      dof_index: 18
      limit_lower: -0.1745
      limit_upper:  1.5708
    - name: "left_pinky_MCP_AA"
      finger: "pinky"
      dof_index: 19
      limit_lower: -0.3491
      limit_upper:  0.3491
    - name: "left_pinky_PIP"
      finger: "pinky"
      dof_index: 20
      limit_lower: 0.0
      limit_upper: 1.7453
    - name: "left_pinky_DIP"
      finger: "pinky"
      dof_index: 21
      limit_lower: 0.0
      limit_upper: 1.3963

urdf_download:
  source: "https://github.com/sharpa-robotics/sharpa-urdf-usd-xml"
  path_in_repo: "wave_01/right_sharpa_wave/ 和 wave_01/left_sharpa_wave/"
  note: "含 URDF/USD/XML 三种格式，mesh 为 STL，右手在 meshes/，左手在 meshes_left/"
