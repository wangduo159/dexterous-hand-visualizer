# Allegro Hand 配置（Wonik Robotics）
# 四指手：食指/中指/无名指各4DOF + 拇指4DOF = 16 DOF
# URDF 来源: dex-retargeting assets
# joint_0~3: 食指, joint_4~7: 中指, joint_8~11: 无名指, joint_12~15: 拇指

hand_name: "allegro_hand"
display_name: "Allegro Hand"
dof: 16
fingers: ["index", "middle", "ring", "thumb"]

urdf:
  left:  "allegro_hand_left.urdf"
  right: "allegro_hand_right.urdf"

# urdf_dir 指向 retarget assets（在 config_loader 中通过 urdf_dir_override 支持）
urdf_dir_override: "/Users/wangduo/Downloads/retarget/assets/robots/hands/allegro_hand"

joints:
  right:
    - {name: "joint_0.0",  finger: "index",  dof_index: 0,  limit_lower: -0.47,  limit_upper: 0.47}
    - {name: "joint_1.0",  finger: "index",  dof_index: 1,  limit_lower: -0.196, limit_upper: 1.61}
    - {name: "joint_2.0",  finger: "index",  dof_index: 2,  limit_lower: -0.174, limit_upper: 1.709}
    - {name: "joint_3.0",  finger: "index",  dof_index: 3,  limit_lower: -0.227, limit_upper: 1.618}
    - {name: "joint_4.0",  finger: "middle", dof_index: 4,  limit_lower: -0.47,  limit_upper: 0.47}
    - {name: "joint_5.0",  finger: "middle", dof_index: 5,  limit_lower: -0.196, limit_upper: 1.61}
    - {name: "joint_6.0",  finger: "middle", dof_index: 6,  limit_lower: -0.174, limit_upper: 1.709}
    - {name: "joint_7.0",  finger: "middle", dof_index: 7,  limit_lower: -0.227, limit_upper: 1.618}
    - {name: "joint_8.0",  finger: "ring",   dof_index: 8,  limit_lower: -0.47,  limit_upper: 0.47}
    - {name: "joint_9.0",  finger: "ring",   dof_index: 9,  limit_lower: -0.196, limit_upper: 1.61}
    - {name: "joint_10.0", finger: "ring",   dof_index: 10, limit_lower: -0.174, limit_upper: 1.709}
    - {name: "joint_11.0", finger: "ring",   dof_index: 11, limit_lower: -0.227, limit_upper: 1.618}
