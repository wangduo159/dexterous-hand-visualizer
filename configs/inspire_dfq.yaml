# 因时（Inspire）DFQ 灵巧手配置
# 五指手：单手 15 DOF（每指 3 DOF）
# URDF 来源: https://github.com/unitreerobotics/unitree_ros
#            robots/g1_description/inspire_hand/DFQ_left_hand.urdf
#            robots/g1_description/inspire_hand/DFQ_right_hand.urdf

hand_name: "inspire_dfq"
display_name: "因时 Inspire DFQ"
dof: 15   # 单手 15 DOF（5指 × 3 DOF）
fingers: ["thumb", "index", "middle", "ring", "pinky"]

urdf:
  left: "DFQ_left_hand.urdf"
  right: "DFQ_right_hand.urdf"

joints:
  left:
    # 拇指 (3 DOF)
    - name: "left_hand_thumb_0_joint"
      finger: "thumb"
      dof_index: 0
      description: "拇指外展"
      limit_lower: -1.5708
      limit_upper:  1.5708
    - name: "left_hand_thumb_1_joint"
      finger: "thumb"
      dof_index: 1
      description: "拇指近端弯曲"
      limit_lower: -1.5708
      limit_upper:  1.5708
    - name: "left_hand_thumb_2_joint"
      finger: "thumb"
      dof_index: 2
      description: "拇指远端弯曲"
      limit_lower: -1.5708
      limit_upper:  1.5708
    # 食指 (3 DOF)
    - name: "left_hand_index_0_joint"
      finger: "index"
      dof_index: 3
      limit_lower: -1.5708
      limit_upper:  1.5708
    - name: "left_hand_index_1_joint"
      finger: "index"
      dof_index: 4
      limit_lower: -1.5708
      limit_upper:  1.5708
    - name: "left_hand_index_2_joint"
      finger: "index"
      dof_index: 5
      limit_lower: -1.5708
      limit_upper:  1.5708
    # 中指 (3 DOF)
    - name: "left_hand_middle_0_joint"
      finger: "middle"
      dof_index: 6
      limit_lower: -1.5708
      limit_upper:  1.5708
    - name: "left_hand_middle_1_joint"
      finger: "middle"
      dof_index: 7
      limit_lower: -1.5708
      limit_upper:  1.5708
    - name: "left_hand_middle_2_joint"
      finger: "middle"
      dof_index: 8
      limit_lower: -1.5708
      limit_upper:  1.5708
    # 无名指 (3 DOF)
    - name: "left_hand_ring_0_joint"
      finger: "ring"
      dof_index: 9
      limit_lower: -1.5708
      limit_upper:  1.5708
    - name: "left_hand_ring_1_joint"
      finger: "ring"
      dof_index: 10
      limit_lower: -1.5708
      limit_upper:  1.5708
    - name: "left_hand_ring_2_joint"
      finger: "ring"
      dof_index: 11
      limit_lower: -1.5708
      limit_upper:  1.5708
    # 小指 (3 DOF)
    - name: "left_hand_pinky_0_joint"
      finger: "pinky"
      dof_index: 12
      limit_lower: -1.5708
      limit_upper:  1.5708
    - name: "left_hand_pinky_1_joint"
      finger: "pinky"
      dof_index: 13
      limit_lower: -1.5708
      limit_upper:  1.5708
    - name: "left_hand_pinky_2_joint"
      finger: "pinky"
      dof_index: 14
      limit_lower: -1.5708
      limit_upper:  1.5708

  right: ~   # 与 left 结构相同，前缀替换为 right_hand_

urdf_download:
  source: "https://github.com/unitreerobotics/unitree_ros"
  path_in_repo: "robots/g1_description/inspire_hand/"
  note: "需要同时下载对应的 meshes 目录"
