# Schunk SVH Hand 配置
# 五指手，20 DOF
# URDF 来源: dex-retargeting assets (schunk_hand/)
#
# 注意：retarget pkl 输出的角度全为正值，与 URDF 原始 limit 符号相反。
# 此处 limit 以 pkl 实际数据范围为准（正值），保证 clip 不截断数据。

hand_name: "svh_hand"
display_name: "Schunk SVH"
dof: 20
fingers: ["thumb", "index", "middle", "ring", "pinky"]

urdf:
  left:  "schunk_svh_hand_left.urdf"
  right: "schunk_svh_hand_right.urdf"

urdf_dir_override: "/Users/wangduo/Downloads/retarget/assets/robots/hands/schunk_hand"

joints:
  right:
    # 拇指 — pkl 输出正值，limit 改为正值范围
    - {name: "right_hand_Thumb_Opposition",      finger: "thumb",  dof_index: 0,  limit_lower: 0.0,   limit_upper: 0.988}
    - {name: "right_hand_Thumb_Flexion",         finger: "thumb",  dof_index: 1,  limit_lower: 0.0,   limit_upper: 0.97}
    - {name: "right_hand_j3",                    finger: "thumb",  dof_index: 2,  limit_lower: 0.0,   limit_upper: 0.988}
    - {name: "right_hand_j4",                    finger: "thumb",  dof_index: 3,  limit_lower: 0.0,   limit_upper: 1.406}
    # 食指
    - {name: "right_hand_index_spread",          finger: "index",  dof_index: 4,  limit_lower: -0.288, limit_upper: 0.288}
    - {name: "right_hand_Index_Finger_Proximal", finger: "index",  dof_index: 5,  limit_lower: 0.0,   limit_upper: 0.798}
    - {name: "right_hand_Index_Finger_Distal",   finger: "index",  dof_index: 6,  limit_lower: 0.0,   limit_upper: 1.334}
    - {name: "right_hand_j14",                   finger: "index",  dof_index: 7,  limit_lower: 0.0,   limit_upper: 1.394}
    # 中指掌骨关节（j5 连接 e1→e2，驱动手掌下半部）— pkl 输出正值
    - {name: "right_hand_j5",                    finger: "middle", dof_index: 8,  limit_lower: 0.0,   limit_upper: 0.988}
    # 中指展开（Finger_Spread）
    - {name: "right_hand_Finger_Spread",         finger: "middle", dof_index: 9,  limit_lower: -0.583, limit_upper: 0.583}
    # 小指
    - {name: "right_hand_Pinky",                 finger: "pinky",  dof_index: 10, limit_lower: 0.0,   limit_upper: 0.982}
    - {name: "right_hand_j13",                   finger: "pinky",  dof_index: 11, limit_lower: 0.0,   limit_upper: 1.334}
    - {name: "right_hand_j17",                   finger: "pinky",  dof_index: 12, limit_lower: 0.0,   limit_upper: 1.397}
    # 无名指
    - {name: "right_hand_ring_spread",           finger: "ring",   dof_index: 13, limit_lower: -0.288, limit_upper: 0.288}
    - {name: "right_hand_Ring_Finger",           finger: "ring",   dof_index: 14, limit_lower: 0.0,   limit_upper: 0.982}
    - {name: "right_hand_j12",                   finger: "ring",   dof_index: 15, limit_lower: 0.0,   limit_upper: 1.334}
    - {name: "right_hand_j16",                   finger: "ring",   dof_index: 16, limit_lower: 0.0,   limit_upper: 1.395}
    # 中指近端/远端
    - {name: "right_hand_Middle_Finger_Proximal",finger: "middle", dof_index: 17, limit_lower: 0.0,   limit_upper: 0.798}
    - {name: "right_hand_Middle_Finger_Distal",  finger: "middle", dof_index: 18, limit_lower: 0.0,   limit_upper: 1.334}
    - {name: "right_hand_j15",                   finger: "middle", dof_index: 19, limit_lower: 0.0,   limit_upper: 1.334}

  left:
    - {name: "left_hand_Thumb_Opposition",      finger: "thumb",  dof_index: 0,  limit_lower: 0.0,   limit_upper: 0.988}
    - {name: "left_hand_Thumb_Flexion",         finger: "thumb",  dof_index: 1,  limit_lower: 0.0,   limit_upper: 0.97}
    - {name: "left_hand_j3",                    finger: "thumb",  dof_index: 2,  limit_lower: 0.0,   limit_upper: 0.988}
    - {name: "left_hand_j4",                    finger: "thumb",  dof_index: 3,  limit_lower: 0.0,   limit_upper: 1.406}
    - {name: "left_hand_index_spread",          finger: "index",  dof_index: 4,  limit_lower: -0.288, limit_upper: 0.288}
    - {name: "left_hand_Index_Finger_Proximal", finger: "index",  dof_index: 5,  limit_lower: 0.0,   limit_upper: 0.798}
    - {name: "left_hand_Index_Finger_Distal",   finger: "index",  dof_index: 6,  limit_lower: 0.0,   limit_upper: 1.334}
    - {name: "left_hand_j14",                   finger: "index",  dof_index: 7,  limit_lower: 0.0,   limit_upper: 1.394}
    - {name: "left_hand_j5",                    finger: "middle", dof_index: 8,  limit_lower: 0.0,   limit_upper: 0.988}
    - {name: "left_hand_Finger_Spread",         finger: "middle", dof_index: 9,  limit_lower: -0.583, limit_upper: 0.583}
    - {name: "left_hand_Pinky",                 finger: "pinky",  dof_index: 10, limit_lower: 0.0,   limit_upper: 0.982}
    - {name: "left_hand_j13",                   finger: "pinky",  dof_index: 11, limit_lower: 0.0,   limit_upper: 1.334}
    - {name: "left_hand_j17",                   finger: "pinky",  dof_index: 12, limit_lower: 0.0,   limit_upper: 1.397}
    - {name: "left_hand_ring_spread",           finger: "ring",   dof_index: 13, limit_lower: -0.288, limit_upper: 0.288}
    - {name: "left_hand_Ring_Finger",           finger: "ring",   dof_index: 14, limit_lower: 0.0,   limit_upper: 0.982}
    - {name: "left_hand_j12",                   finger: "ring",   dof_index: 15, limit_lower: 0.0,   limit_upper: 1.334}
    - {name: "left_hand_j16",                   finger: "ring",   dof_index: 16, limit_lower: 0.0,   limit_upper: 1.395}
    - {name: "left_hand_Middle_Finger_Proximal",finger: "middle", dof_index: 17, limit_lower: 0.0,   limit_upper: 0.798}
    - {name: "left_hand_Middle_Finger_Distal",  finger: "middle", dof_index: 18, limit_lower: 0.0,   limit_upper: 1.334}
    - {name: "left_hand_j15",                   finger: "middle", dof_index: 19, limit_lower: 0.0,   limit_upper: 1.334}
